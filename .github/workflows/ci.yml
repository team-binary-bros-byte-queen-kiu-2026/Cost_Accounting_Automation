name: CI — Golden Set Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Seed database
        env:
          DATABASE_PATH: ./backend/database/prices.db
        run: python backend/database/seed_prices.py

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "❌ OPENROUTER_API_KEY secret is not set."
            echo "   Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "   Add OPENROUTER_API_KEY with your OpenRouter API key."
            exit 1
          fi
          echo "✅ OPENROUTER_API_KEY is set"

      - name: Start backend
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          DATABASE_PATH: ./backend/database/prices.db
          CHROMA_DB_PATH: ./chroma_db
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
          curl -f http://localhost:8000/health || (echo "❌ Backend failed to start" && exit 1)
          echo "✅ Backend is up"

      - name: Run golden set evaluation
        env:
          BACKEND_URL: http://localhost:8000
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python eval/run_eval.py

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval/results/
